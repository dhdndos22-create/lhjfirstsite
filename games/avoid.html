<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장애물 피하기 - 효종월드</title>
  <link rel="stylesheet" href="avoid.css">
</head>
<body>
  <h1>🎮 장애물 피하기</h1>

  <section id="gameWrap">
    <div id="startScreen">
      <h2>장애물 피하기</h2>
      <p>PC: 스페이스바 / 모바일: 화면 터치</p>
      <button id="startBtn">게임 시작</button>
    </div>

    <div id="game">
      <div id="score">점수 : 0</div>

      <div class="game-cloud game-cloud1"></div>
      <div class="game-cloud game-cloud2"></div>

      <div class="bird bird1">⌒⌒</div>
      <div class="bird bird2">⌒⌒</div>

      <div id="player">
        <img src="../images/player.png" alt="플레이어">
      </div>

      <div id="obstacle"></div>
    </div>
  </section>

  <a class="back-btn" href="../index.html">← 메인으로</a>

  <script src="avoid.js"></script>
</body>
</html>
