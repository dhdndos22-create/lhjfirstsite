<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>억만장자 - 효종월드</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/start.css" />
  <link rel="stylesheet" href="css/game.css" />
  <link rel="stylesheet" href="css/menu.css" />
  <link rel="stylesheet" href="css/effects.css" />
  <link rel="stylesheet" href="css/job.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- 시작 화면 -->
  <section id="startScreen">
    <h1>💰 억만장자 💰</h1>

    <p>
      화면을 눌러 돈을 벌고,
      업그레이드해서 억만장자가 되어보자!
    </p>

    <button id="startBtn">게임시작</button>
    <button id="homeBtn">효종월드로 돌아가기</button>
  </section>

  <!-- 게임 화면 -->
  <section id="gameScreen" class="hidden">

    <!-- 상단 상태 -->
    <header class="topStatus">
      <div>
        <span>보유금</span>
        <strong id="moneyText">0원</strong>
      </div>

      <div>
        <span>레벨</span>
        <strong id="levelText">1</strong>
      </div>
    </header>

    <!-- 통합 메뉴 버튼 -->
    <button id="gameMenuBtn">☰ 메뉴</button>

    <!-- 통합 메뉴 -->
    <div id="gameMenuPanel" class="hidden">

      <button class="menuItem" id="upgradeMenuBtn">
        💪 강화
      </button>

      <div id="upgradeSubMenu" class="hidden">

        <button class="subMenuItem" id="clickUpgradeBtn">
          클릭 강화<br>
          <span id="clickUpgradeCostText">
            비용: 50원
          </span>
        </button>

        <button class="subMenuItem" id="autoUpgradeBtn">
          초당 수입 강화<br>
          <span id="autoUpgradeCostText">
            비용: 100원
          </span>
        </button>

        <button class="subMenuItem" id="levelUpBtn">
          레벨업<br>
          <span id="levelUpCostText">
            비용: 500원
          </span>
        </button>

      </div>

      <!-- 직업 버튼 -->
      <button class="menuItem" id="jobMenuBtn">
        💼 직업
      </button>

      <!-- 나머지 메뉴 -->
      <button class="menuItem preparing">
        🏢 건물
      </button>

      <button class="menuItem preparing">
        👥 고용
      </button>

      <button class="menuItem preparing">
        🐶 펫
      </button>

      <button class="menuItem preparing">
        🛒 상점
      </button>

      <button class="menuItem preparing">
        ⚔ 장비
      </button>

      <button class="menuItem preparing">
        🎰 복권
      </button>

      <button class="menuItem preparing">
        🏆 업적
      </button>

    </div>

    <!-- 클릭 영역 -->
    <main id="clickArea">
      <div class="characterBox">

        <img
          src="../../images/mascot.png"
          alt="효종월드 캐릭터"
          id="mainCharacter"
        >

        <p>화면 아무 곳이나 클릭!</p>

        <p class="incomeText">
          클릭당 수입:
          <strong id="clickPowerText">1원</strong>
          <br>

          초당 수입:
          <strong id="autoIncomeText">0원 / 초</strong>
        </p>

      </div>
    </main>

    <!-- 직업 패널 -->
    <div id="jobPanel" class="contentPanel hidden">

      <div class="contentPanelHeader">
        <h2>💼 직업</h2>
        <button id="jobPanelCloseBtn">✕</button>
      </div>

      <div class="jobStatusBox">

        <p>
          직업 레벨
          <strong id="jobLevelText">1</strong>
        </p>

        <p>
          다음 취업
          <strong id="nextJobLevelText">
            레벨 10
          </strong>
        </p>

        <p>
          직업 클릭 보너스
          <strong id="jobClickBonusText">
            0원
          </strong>
        </p>

        <p>
          직업 초당 보너스
          <strong id="jobAutoBonusText">
            0원 / 초
          </strong>
        </p>

      </div>

      <button id="jobLevelUpBtn" class="jobLevelUpBtn">
        직업 레벨업
        <span id="jobLevelUpCostText">
          비용: 100원
        </span>
      </button>

      <div class="jobHistoryBox">
        <h3>취업 기록</h3>

        <div id="jobHistoryList">
          아직 직업이 없습니다.
        </div>
      </div>

    </div>

    <!-- 취업 선택 모달 -->
    <div id="jobChoiceOverlay" class="jobChoiceOverlay hidden">

      <div class="jobChoiceModal">

        <h2>🎉 취업할 수 있습니다!</h2>

        <p id="jobChoiceLevelText">
          직업 레벨 10 달성
        </p>

        <p class="jobChoiceGuide">
          세 가지 직업 중 하나를 선택하세요.
        </p>

        <div
          id="jobChoiceList"
          class="jobChoiceList"
        ></div>

      </div>

    </div>

  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/main.js"></script>

</body>
</html>
