<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>억만장자 - 효종월드</title>
  <link rel="stylesheet" href="billionaire.css" />
</head>
<body>

  <section id="startScreen">
    <h1>💰 억만장자 💰</h1>
    <p>화면을 눌러 돈을 벌고, 업그레이드해서 억만장자가 되어보자!</p>
    <button id="startBtn">게임시작</button>
    <button id="homeBtn">효종월드로 돌아가기</button>
  </section>

  <section id="gameScreen" class="hidden">
    <header class="topStatus">
      <div>
        <span>보유금</span>
        <strong id="moneyText">0원</strong>
      </div>
      <div>
        <span>레벨</span>
        <strong id="levelText">1</strong>
      </div>
    </header>

    <button id="gameMenuBtn">☰ 메뉴</button>

    <div id="gameMenuPanel" class="hidden">
      <button class="menuItem" id="upgradeMenuBtn">강화</button>

      <div id="upgradeSubMenu" class="hidden">
        <button class="subMenuItem" id="clickUpgradeBtn">
          클릭 강화<br>
          <span id="clickUpgradeCostText">비용: 50원</span>
        </button>

        <button class="subMenuItem" id="autoUpgradeBtn">
          시간당 강화<br>
          <span id="autoUpgradeCostText">비용: 100원</span>
        </button>

        <button class="subMenuItem" id="levelUpBtn">
          레벨업<br>
          <span id="levelUpCostText">비용: 500원</span>
        </button>
      </div>

      <button class="menuItem preparing">직업</button>
      <button class="menuItem preparing">부동산</button>
      <button class="menuItem preparing">사업</button>
      <button class="menuItem preparing">주식</button>
      <button class="menuItem preparing">자동차</button>
      <button class="menuItem preparing">펫</button>
      <button class="menuItem preparing">업적</button>
      <button class="menuItem preparing">랭킹</button>
      <button class="menuItem preparing">설정</button>
    </div>

    <main id="clickArea">
      <div class="characterBox">
        <img src="../../images/mascot.png" alt="효종월드 캐릭터" id="mainCharacter">
        <p>화면 아무 곳이나 클릭!</p>
        <p class="incomeText">
          클릭당 수입: <strong id="clickPowerText">1원</strong><br>
          초당 수입: <strong id="autoIncomeText">0원 / 초</strong>
        </p>
      </div>
    </main>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
