<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#008fd3">
  <title>피싱월드</title>
  <link rel="stylesheet" href="./css/fishing-world.css">
</head>
<body>
  <main id="app">
    <!-- 게임 시작 화면 -->
    <section
      id="startScreen"
      class="game-screen start-screen is-active"
      aria-label="피싱월드 시작 화면"
      aria-hidden="false"
    >
      <img
        class="screen-background start-background"
        src="./images/start-background.png"
        alt=""
        draggable="false"
      >

      <button
        id="startButton"
        class="game-button start-button"
        type="button"
        aria-label="게임 시작"
      >
        <img
          src="./images/start-button.png"
          alt="게임 시작"
          draggable="false"
        >
      </button>

    </section>

    <!-- 메인 로비 화면 -->
    <section
      id="lobbyScreen"
      class="game-screen lobby-screen"
      aria-label="피싱월드 메인 로비"
      aria-hidden="true"
    >
      <img
        class="screen-background lobby-background"
        src="./images/lobby-background.png"
        alt=""
        draggable="false"
      >

      <div id="lobbyMenu" class="lobby-menu" aria-label="로비 메뉴">
        <button
          id="menuButton"
          class="lobby-action-button lobby-menu-button"
          type="button"
          aria-label="메뉴 열기"
        >
          <img src="./images/menu-button-1.png" alt="" draggable="false">
          <span class="lobby-button-label lobby-menu-label">메뉴</span>
        </button>

        <button
          id="fishingButton"
          class="lobby-action-button lobby-fishing-button"
          type="button"
          aria-label="낚시하기"
        >
          <img src="./images/menu-button-2.png" alt="" draggable="false">
          <span class="lobby-button-label lobby-fishing-label">낚시하기</span>
        </button>
      </div>
    </section>

    <div id="bubbleLayer" class="bubble-layer" aria-hidden="true"></div>
  </main>

  <script type="module" src="./js/fishing-world.js"></script>
</body>
</html>
