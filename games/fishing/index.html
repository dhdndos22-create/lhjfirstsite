<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#008fd3">
  <title>피싱월드</title>
  <link rel="stylesheet" href="./css/fishing-world.css">
  <link rel="stylesheet" href="./css/common-panel-ui.css">
</head>
<body>
  <main id="app">
    <section id="startScreen" class="game-screen start-screen is-active" aria-label="피싱월드 시작 화면" aria-hidden="false">
      <img class="screen-background start-background" src="./images/start-background.png" alt="" draggable="false">
      <button id="startButton" class="game-button start-button" type="button" aria-label="게임 시작">
        <img src="./images/start-button.png" alt="게임 시작" draggable="false">
      </button>
    </section>

    <section id="lobbyScreen" class="game-screen lobby-screen" aria-label="피싱월드 메인 로비" aria-hidden="true">
      <img class="screen-background lobby-background" src="./images/lobby-background.png" alt="" draggable="false">

      <header id="lobbyStatusMount" class="status-mount"></header>

      <nav id="quickMenuPanel" class="quick-menu-panel" aria-label="확장 메뉴" aria-hidden="true">
        <button class="quick-menu-item" type="button" data-menu="shop"><span aria-hidden="true">🛒</span><span>상점</span></button>
        <button class="quick-menu-item" type="button" data-menu="inventory"><span aria-hidden="true">🎒</span><span>인벤토리</span></button>
        <button class="quick-menu-item" type="button" data-menu="equipment"><span aria-hidden="true">🎣</span><span>장비</span></button>
        <button class="quick-menu-item" type="button" data-menu="draw"><span aria-hidden="true">🎁</span><span>뽑기</span></button>
        <button class="quick-menu-item" type="button" data-menu="achievement"><span aria-hidden="true">🏆</span><span>업적</span></button>
        <button class="quick-menu-item" type="button" data-menu="mail"><span aria-hidden="true">✉️</span><span>우편</span></button>
      </nav>

      <div class="lobby-menu" aria-label="로비 메뉴">
        <button id="menuButton" class="lobby-action-button lobby-menu-button" type="button" aria-label="메뉴 열기">
          <img src="./images/menu-button-1.png" alt="" draggable="false">
          <span class="lobby-button-label lobby-menu-label">메뉴</span>
        </button>
        <button id="fishingButton" class="lobby-action-button lobby-fishing-button" type="button" aria-label="낚시하기">
          <img src="./images/menu-button-2.png" alt="" draggable="false">
          <span class="lobby-button-label lobby-fishing-label">낚시하기</span>
        </button>
      </div>
    </section>

    <!-- 상점·인벤토리·장비·뽑기·업적·우편이 공통으로 사용하는 단일 화면 -->
    <section id="commonPanelScreen" class="game-screen common-panel-screen" aria-hidden="true">
      <img class="screen-background common-panel-background" src="./images/shop-background.jpeg" alt="" draggable="false">
      <header id="panelStatusMount" class="status-mount"></header>
      <img class="common-panel-overlay" src="./images/shop-panel-overlay.png" alt="" draggable="false">

      <div class="common-panel-content">
        <div class="common-panel-heading">
          <h1 id="commonPanelTitle" class="common-panel-title">메뉴</h1>
          <div id="commonPanelTabs" class="common-panel-tabs" role="tablist"></div>
        </div>

        <!-- 각 기능의 카드/목록/장비 UI는 이 슬롯에 별도로 렌더링 -->
        <div id="commonPanelBody" class="common-panel-body" aria-live="polite"></div>

        <!-- 페이지가 필요한 기능만 JS에서 표시 -->
        <div id="commonPanelPagination" class="common-panel-pagination" hidden>
          <button id="commonPrevButton" class="common-page-button" type="button" aria-label="이전 페이지">◀</button>
          <span id="commonPageIndicator" class="common-page-indicator">1 / 1</span>
          <button id="commonNextButton" class="common-page-button" type="button" aria-label="다음 페이지">▶</button>
        </div>
      </div>

      <button id="commonPanelBackButton" class="common-panel-back-button" type="button" aria-label="로비로 돌아가기">
        <span aria-hidden="true">←</span>
      </button>
    </section>

    <div id="bubbleLayer" class="bubble-layer" aria-hidden="true"></div>
  </main>

  <script type="module" src="./js/fishing-world.js"></script>
</body>
</html>
