<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#008fd3">
  <title>피싱월드</title>
  <link rel="stylesheet" href="./css/fishing-world.css">
</head>
<body>
  <main id="app">
    <!-- 게임 시작 화면 -->
    <section
      id="startScreen"
      class="game-screen start-screen is-active"
      aria-label="피싱월드 시작 화면"
      aria-hidden="false"
    >
      <img
        class="screen-background start-background"
        src="./images/start-background.png"
        alt=""
        draggable="false"
      >

      <button
        id="startButton"
        class="game-button start-button"
        type="button"
        aria-label="게임 시작"
      >
        <img
          src="./images/start-button.png"
          alt="게임 시작"
          draggable="false"
        >
      </button>
    </section>

    <!-- 메인 로비 화면 -->
    <section
      id="lobbyScreen"
      class="game-screen lobby-screen"
      aria-label="피싱월드 메인 로비"
      aria-hidden="true"
    >
      <img
        class="screen-background lobby-background"
        src="./images/lobby-background.png"
        alt=""
        draggable="false"
      >

      <!-- 로비 상단 상태 UI -->
      <header class="lobby-status-bar" aria-label="플레이어 상태">
        <button
          id="levelStatusButton"
          class="status-button level-status"
          type="button"
          aria-label="레벨 정보"
        >
          <img
            src="./images/level-gauge-ui.png"
            class="status-ui-image"
            alt=""
            draggable="false"
          >

          <span id="playerLevel" class="level-number">1</span>

          <span class="level-progress-area" aria-hidden="true">
            <span id="levelProgressFill" class="level-progress-fill"></span>
          </span>

          <span id="levelExperience" class="level-experience">0 / 100</span>
        </button>

        <button
          id="goldStatusButton"
          class="status-button gold-status"
          type="button"
          aria-label="보유 골드"
        >
          <img
            src="./images/gold-ui.png"
            class="status-ui-image"
            alt=""
            draggable="false"
          >

          <span id="playerGold" class="gold-number">0</span>
        </button>

        <button
          id="energyStatusButton"
          class="status-button energy-status"
          type="button"
          aria-label="에너지 정보"
        >
          <img
            src="./images/energy-ui.png"
            class="status-ui-image"
            alt=""
            draggable="false"
          >

          <span id="playerEnergy" class="energy-number">100 / 100</span>
        </button>
      </header>


      <!-- 로비 중앙 레이어 캐릭터 -->
      <button id="characterButton" class="lobby-character" type="button" aria-label="캐릭터 장비 변경">
        <span class="character-shadow" aria-hidden="true"></span>
        <img id="playerBaseLayer" class="character-piece character-base" src="./images/player/base/player-base.png" alt="메인 캐릭터 1">
        <img id="playerBottomLayer" class="character-piece character-bottom" src="./images/player/bottom/bottom-shorts-001.png" alt="">
        <img id="playerShoesLayer" class="character-piece character-shoes" src="./images/player/shoes/shoes-sneakers-001.png" alt="">
        <img id="playerTopLayer" class="character-piece character-top" src="./images/player/top/top-vest-001.png" alt="">
        <img id="playerRodLayer" class="character-piece character-rod" src="./images/player/rod/rod-basic-001.png" alt="">
        <img id="playerFrontHandLayer" class="character-piece character-front-hand" src="./images/player/base/player-front-hand.png" alt="">
        <img id="playerHeadLayer" class="character-piece character-head" src="./images/player/head/head-cap-001.png" alt="">
      </button>

      <!-- 장비 변경 패널 -->
      <section id="equipmentPanel" class="equipment-panel" aria-hidden="true">
        <div class="equipment-card">
          <header class="equipment-header">
            <h2>장비 변경</h2>
            <button id="equipmentCloseButton" class="equipment-close-button" type="button" aria-label="장비창 닫기">×</button>
          </header>

          <div id="equipmentSlots" class="equipment-slots">
            <button class="equipment-slot" type="button" data-slot="head">
              <strong>머리</strong><span id="equippedHeadName">초보 낚시 모자</span>
            </button>
            <button class="equipment-slot" type="button" data-slot="top">
              <strong>상의</strong><span id="equippedTopName">초보 낚시 조끼</span>
            </button>
            <button class="equipment-slot" type="button" data-slot="bottom">
              <strong>하의</strong><span id="equippedBottomName">초보 반바지</span>
            </button>
            <button class="equipment-slot" type="button" data-slot="shoes">
              <strong>신발</strong><span id="equippedShoesName">초보 운동화</span>
            </button>
            <button class="equipment-slot" type="button" data-slot="rod">
              <strong>낚싯대</strong><span id="equippedRodName">초보 낚싯대</span>
            </button>
          </div>

          <div id="equipmentOptions" class="equipment-options" aria-live="polite"></div>
        </div>
      </section>

      <!-- 로비 하단 버튼 -->
      <div id="lobbyMenu" class="lobby-menu" aria-label="로비 메뉴">
        <button
          id="menuButton"
          class="lobby-action-button lobby-menu-button"
          type="button"
          aria-label="메뉴 열기"
        >
          <img src="./images/menu-button-1.png" alt="" draggable="false">
          <span class="lobby-button-label lobby-menu-label">메뉴</span>
        </button>

        <button
          id="fishingButton"
          class="lobby-action-button lobby-fishing-button"
          type="button"
          aria-label="낚시하기"
        >
          <img src="./images/menu-button-2.png" alt="" draggable="false">
          <span class="lobby-button-label lobby-fishing-label">낚시하기</span>
        </button>
      </div>
    </section>

    <div id="bubbleLayer" class="bubble-layer" aria-hidden="true"></div>
  </main>

  <script type="module" src="./js/fishing-world.js"></script>
</body>
</html>
