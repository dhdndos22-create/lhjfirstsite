<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#008fd3">
  <title>피싱월드</title>
  <link rel="stylesheet" href="./css/fishing-world.css">
  <link rel="stylesheet" href="./css/common-panel-ui.css">
</head>
<body>
  <main id="app">
    <section id="startScreen" class="game-screen start-screen is-active" aria-label="피싱월드 시작 화면" aria-hidden="false">
      <img class="screen-background start-background" src="./images/start-background.png" alt="" draggable="false">
      <button id="startButton" class="game-button start-button" type="button" aria-label="게임 시작">
        <img src="./images/start-button.png" alt="게임 시작" draggable="false">
      </button>
    </section>

    <section id="lobbyScreen" class="game-screen lobby-screen" aria-label="피싱월드 메인 로비" aria-hidden="true">
      <img class="screen-background lobby-background" src="./images/lobby-background.png" alt="" draggable="false">

      <header id="lobbyStatusMount" class="status-mount"></header>

      <nav id="quickMenuPanel" class="quick-menu-panel" aria-label="확장 메뉴" aria-hidden="true">
        <button class="quick-menu-item" type="button" data-menu="shop"><span aria-hidden="true">🛒</span><span>상점</span></button>
        <button class="quick-menu-item" type="button" data-menu="inventory"><span aria-hidden="true">🎒</span><span>인벤토리</span></button>
        <button class="quick-menu-item" type="button" data-menu="equipment"><span aria-hidden="true">🎣</span><span>장비</span></button>
        <button class="quick-menu-item" type="button" data-menu="draw"><span aria-hidden="true">🎁</span><span>뽑기</span></button>
        <button class="quick-menu-item" type="button" data-menu="collection"><span aria-hidden="true">📖</span><span>도감</span></button>
        <button class="quick-menu-item" type="button" data-menu="achievement"><span aria-hidden="true">🏆</span><span>업적</span></button>
        <button class="quick-menu-item" type="button" data-menu="mail"><span aria-hidden="true">✉️</span><span>우편</span></button>
      </nav>

      <div class="lobby-menu" aria-label="로비 메뉴">
        <button id="menuButton" class="lobby-action-button lobby-menu-button" type="button" aria-label="메뉴 열기">
          <img src="./images/menu-button-1.png" alt="" draggable="false">
          <span class="lobby-button-label lobby-menu-label">메뉴</span>
        </button>
        <button id="fishingButton" class="lobby-action-button lobby-fishing-button" type="button" aria-label="낚시하기">
          <img src="./images/menu-button-2.png" alt="" draggable="false">
          <span class="lobby-button-label lobby-fishing-label">낚시하기</span>
        </button>
      </div>
    </section>

    <!-- 상점·인벤토리·장비·뽑기·도감·업적·우편이 공통으로 사용하는 단일 화면 -->
    <section id="commonPanelScreen" class="game-screen common-panel-screen" aria-hidden="true">
      <img class="screen-background common-panel-background" src="./images/shop-background.jpeg" alt="" draggable="false">
      <header id="panelStatusMount" class="status-mount"></header>
      <img class="common-panel-overlay" src="./images/shop-panel-overlay.png" alt="" draggable="false">

      <div class="common-panel-content">
        <div class="common-panel-heading">
          <h1 id="commonPanelTitle" class="common-panel-title">메뉴</h1>
          <div id="commonPanelTabs" class="common-panel-tabs" role="tablist"></div>
        </div>

        <!-- 각 기능의 카드/목록/장비 UI는 이 슬롯에 별도로 렌더링 -->
        <div id="commonPanelBody" class="common-panel-body" aria-live="polite"></div>

        <!-- 페이지가 필요한 기능만 JS에서 표시 -->
        <div id="commonPanelPagination" class="common-panel-pagination" hidden>
          <button id="commonPrevButton" class="common-page-button" type="button" aria-label="이전 페이지">◀</button>
          <span id="commonPageIndicator" class="common-page-indicator">1 / 1</span>
          <button id="commonNextButton" class="common-page-button" type="button" aria-label="다음 페이지">▶</button>
        </div>
      </div>

      <button id="commonPanelBackButton" class="common-panel-back-button" type="button" aria-label="로비로 돌아가기">
        <span aria-hidden="true">←</span>
      </button>
    </section>


    <section id="stageSelectScreen" class="game-screen stage-select-screen" aria-label="낚시 스테이지 선택" aria-hidden="true">
      <img class="screen-background stage-select-background" src="./images/stages/stage-select-background.png" alt="" draggable="false">
      <div class="stage-select-water-overlay" aria-hidden="true"></div>
      <header id="stageStatusMount" class="status-mount"></header>

      <button id="stageSelectBackButton" class="stage-top-back-button" type="button" aria-label="로비로 돌아가기">←</button>

      <div class="stage-select-content">
        <div class="stage-heading-board">
          <h1 class="stage-select-title">스테이지 선택</h1>
          <p class="stage-select-guide">좌우 화살표로 낚시터를 선택하세요</p>
        </div>

        <article id="stageCard" class="stage-card" aria-live="polite">
          <div class="stage-title-area">
            <span class="stage-card-number" id="stageNumberText">STAGE 1</span>
            <h2 id="stageNameText" class="stage-name">초보자의 연못</h2>
            <div id="stageDifficultyText" class="stage-difficulty" aria-label="난이도"></div>
          </div>

          <div class="stage-island-area">
            <button id="stagePrevButton" class="stage-arrow-button stage-arrow-left" type="button" aria-label="이전 스테이지">◀</button>
            <div class="stage-preview" id="stagePreview">
              <img id="stageIslandImage" class="stage-island-image" src="./images/stages/stage-1-island.png" alt="초보자의 연못 섬" draggable="false">
              <div id="stageLockOverlay" class="stage-lock-overlay" hidden>
                <span class="stage-lock-icon" aria-hidden="true">🔒</span>
                <span>잠긴 스테이지</span>
              </div>
            </div>
            <button id="stageNextButton" class="stage-arrow-button stage-arrow-right" type="button" aria-label="다음 스테이지">▶</button>
          </div>

          <div id="stagePageDots" class="stage-page-dots" aria-label="스테이지 위치"></div>

          <div class="stage-info-panel">
            <p id="stageDescriptionText" class="stage-description"></p>
            <div id="stageRequirementText" class="stage-requirement"></div>
          </div>

          <button id="stageEnterButton" class="stage-enter-button" type="button">입장하기</button>
        </article>
      </div>
    </section>

    <section id="fishingStageScreen" class="game-screen fishing-stage-screen" aria-label="스테이지 낚시 화면" aria-hidden="true">
      <img
        class="screen-background stage1-pond-background"
        src="./images/fishing/stage-1-pond-background.png"
        alt=""
        draggable="false"
      >

      <canvas id="stage1CastingCanvas" class="stage1-casting-canvas" aria-hidden="true"></canvas>
      <header id="fishingStatusMount" class="status-mount stage1-status-mount"></header>

      <div id="stage1CastingUi" class="stage1-casting-ui">
        <div class="stage1-location-badge">
          <span id="fishingStageNumber">STAGE 1</span>
          <strong id="fishingStageName">초보자의 연못</strong>
          <p id="fishingStageDescription"></p>
        </div>

        <div id="castingGuide" class="casting-guide" aria-live="polite">
          <strong id="castingGuideTitle">캐스팅 준비 완료</strong>
          <span id="castingGuideText">버튼을 길게 누른 뒤 초록 구간에서 손을 떼세요.</span>
        </div>

        <section class="casting-power-panel" aria-label="캐스팅 파워">
          <div class="casting-power-heading">
            <span>캐스팅 파워</span>
            <strong id="castingPowerPercent">0%</strong>
          </div>

          <div class="casting-power-track">
            <span class="casting-good-zone" aria-hidden="true"></span>
            <span id="castingPowerFill" class="casting-power-fill" aria-hidden="true"></span>
            <span id="castingPowerMarker" class="casting-power-marker" aria-hidden="true"></span>
          </div>
        </section>

        <div class="casting-control-area">
          <button id="stage1CastButton" class="stage1-cast-button" type="button">
            <span class="stage1-cast-icon" aria-hidden="true">🎣</span>
            <span id="stage1CastButtonText">길게 눌러 캐스팅</span>
          </button>

          <button id="stage1CastResetButton" class="stage1-cast-reset-button" type="button" hidden>
            다시 캐스팅
          </button>
        </div>
      </div>

      <button id="fishingStageBackButton" class="round-back-button stage1-fishing-back-button" type="button" aria-label="스테이지 선택으로 돌아가기">←</button>
    </section>


    <div id="fishDetailModal" class="fish-detail-modal" hidden>
      <button class="fish-detail-backdrop" type="button" data-fish-modal-close aria-label="상세 창 닫기"></button>
      <section class="fish-detail-dialog" role="dialog" aria-modal="true" aria-labelledby="fishDetailName">
        <button id="fishDetailCloseButton" class="fish-detail-close" type="button" aria-label="닫기">×</button>

        <div id="fishDetailRarity" class="fish-detail-rarity">노말</div>

        <div class="fish-detail-image-area">
          <img id="fishDetailImage" src="" alt="" draggable="false">
        </div>

        <h2 id="fishDetailName" class="fish-detail-name"></h2>
        <p id="fishDetailDescription" class="fish-detail-description"></p>

        <dl class="fish-detail-stats">
          <div><dt>크기</dt><dd id="fishDetailSize"></dd></div>
          <div><dt>판매가</dt><dd id="fishDetailPrice"></dd></div>
          <div><dt>도감 획득</dt><dd id="fishDetailCollectionCount"></dd></div>
          <div><dt>현재 보유</dt><dd id="fishDetailInventoryCount"></dd></div>
        </dl>

        <div id="fishSellArea" class="fish-sell-area" hidden>
          <div class="fish-sell-quantity">
            <button id="fishSellMinusButton" type="button" aria-label="판매 수량 줄이기">−</button>
            <strong id="fishSellQuantity">1</strong>
            <button id="fishSellPlusButton" type="button" aria-label="판매 수량 늘리기">＋</button>
            <button id="fishSellAllButton" class="fish-sell-all" type="button">전체</button>
          </div>
          <button id="fishSellButton" class="fish-sell-button" type="button">
            <span>판매하기</span>
            <strong id="fishSellTotalPrice">0 G</strong>
          </button>
        </div>
      </section>
    </div>

    <div id="bubbleLayer" class="bubble-layer" aria-hidden="true"></div>
  </main>

  <script type="module" src="./js/fishing-world.js"></script>
  <script type="module" src="./js/stage1-casting.js"></script>
</body>
</html>
