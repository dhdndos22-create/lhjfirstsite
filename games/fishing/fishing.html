<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>피싱월드 - 효종월드</title>
  <link rel="stylesheet" href="./css/fishing.css">
</head>
<body>
  <main id="app">
    <section id="startScreen" class="screen start-screen">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="sun"></div>

      <button id="startMenuBtn" class="top-icon-button" type="button" aria-label="메뉴 열기">☰</button>

      <div class="start-content">
        <p class="start-badge">효종월드 신규 게임</p>

        <h1 class="game-title">
          <span class="title-hook">🎣</span>
          피싱월드
        </h1>

        <p class="game-subtitle">
          최고의 낚싯대를 모으고<br>
          전설의 물고기를 낚아라!
        </p>

        <div class="boat-scene" aria-hidden="true">
          <div class="fishing-line"></div>
          <div class="float"></div>
          <div class="boat">
            <div class="player">🧑‍🌾</div>
          </div>
          <div class="wave wave-1"></div>
          <div class="wave wave-2"></div>
          <div class="fish-shadow">🐟</div>
        </div>

        <button id="startBtn" class="primary-button start-button" type="button">
          게임 시작
        </button>

        <p id="startUserText" class="start-user-text">게스트 낚시꾼</p>
      </div>

      <p class="version-text">Fishing World v0.1.0</p>
    </section>

    <section id="lobbyScreen" class="screen lobby-screen hidden">
      <header class="lobby-header">
        <div class="profile-box">
          <div class="profile-avatar">🎣</div>
          <div>
            <strong id="nicknameText">효종</strong>
            <div class="level-line">
              <span id="levelText">Lv.1</span>
              <div class="exp-track" aria-label="경험치">
                <div id="expBar" class="exp-bar"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="currency-area">
          <button class="currency-box" type="button" data-menu="골드 상점">
            <span>💰</span>
            <strong id="goldText">10,000</strong>
          </button>
          <button class="currency-box" type="button" data-menu="보석 상점">
            <span>💎</span>
            <strong id="gemText">50</strong>
          </button>
          <button id="lobbyMenuBtn" class="header-menu-button" type="button" aria-label="메뉴 열기">☰</button>
        </div>
      </header>

      <div class="lobby-main">
        <section class="stage-hero">
          <div class="stage-cloud stage-cloud-1"></div>
          <div class="stage-cloud stage-cloud-2"></div>

          <div class="stage-info-panel">
            <div class="stage-label">STAGE 1</div>
            <h2>동네 연못</h2>
            <p>낚시를 처음 배우는 초보 낚시꾼들의 연못</p>

            <div class="stage-tags">
              <span class="grade normal">일반</span>
              <span class="grade rare">레어</span>
            </div>

            <div class="stage-progress">
              <span>도감 발견</span>
              <strong>0 / 8</strong>
            </div>
          </div>

          <div class="lobby-character" aria-hidden="true">
            <div class="character">🧑‍🌾</div>
            <div class="character-rod">╱</div>
          </div>

          <div class="pond">
            <div class="pond-ripple ripple-1"></div>
            <div class="pond-ripple ripple-2"></div>
            <span class="pond-fish fish-a">🐟</span>
            <span class="pond-fish fish-b">🐠</span>
          </div>

          <div class="stage-action-group">
            <button id="goFishingBtn" class="primary-button fishing-button" type="button">
              낚시하러 가기
            </button>
            <button id="changeStageBtn" class="secondary-button" type="button">
              스테이지 변경
            </button>
          </div>
        </section>

        <section class="quick-status">
          <button class="status-card" type="button" data-menu="장비">
            <span class="status-icon">🎣</span>
            <span>
              <small>현재 낚싯대</small>
              <strong>낡은 낚싯대</strong>
            </span>
            <em class="grade normal">일반</em>
          </button>

          <button class="status-card" type="button" data-menu="미끼">
            <span class="status-icon">🪱</span>
            <span>
              <small>현재 미끼</small>
              <strong>기본 지렁이</strong>
            </span>
            <em class="grade normal">일반</em>
          </button>
        </section>
      </div>

      <nav class="bottom-navigation" aria-label="로비 메뉴">
        <button type="button" data-menu="장비"><span>🎣</span><small>장비</small></button>
        <button type="button" data-menu="가방"><span>🎒</span><small>가방</small></button>
        <button type="button" data-menu="도감"><span>🐟</span><small>도감</small></button>
        <button type="button" data-menu="스테이지"><span>🗺️</span><small>스테이지</small></button>
        <button type="button" data-menu="뽑기"><span>🎁</span><small>뽑기</small></button>
      </nav>
    </section>

    <aside id="sideMenu" class="side-menu" aria-hidden="true">
      <div class="side-menu-backdrop" data-close-menu></div>
      <div class="side-menu-panel">
        <div class="side-menu-header">
          <strong>게임 메뉴</strong>
          <button type="button" data-close-menu aria-label="메뉴 닫기">✕</button>
        </div>
        <button id="menuLobbyBtn" type="button">🏠 로비로</button>
        <button type="button" data-menu="설정">⚙️ 설정</button>
        <button type="button" data-menu="우편함">📮 우편함</button>
        <button type="button" data-menu="공지사항">📢 공지사항</button>
        <button id="menuHomeBtn" type="button">🌍 효종월드 홈</button>
      </div>
    </aside>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-backdrop"></div>
      <div class="modal-card">
        <div id="modalIcon" class="modal-icon">🚧</div>
        <h2 id="modalTitle">준비 중</h2>
        <p id="modalMessage">이 기능은 준비 중입니다.</p>
        <button id="modalCloseBtn" class="primary-button modal-close-button" type="button">확인</button>
      </div>
    </div>

    <div id="screenTransition" class="screen-transition" aria-hidden="true">
      <span>🎣</span>
      <strong>낚시터로 이동 중...</strong>
    </div>
  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
