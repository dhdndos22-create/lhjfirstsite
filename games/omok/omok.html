<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>효종월드 오목</title>
  <link rel="stylesheet" href="./omok.css" />
</head>
<body>
  <div class="omok-bg">
    <section id="startScreen" class="screen active">
      <h1>⚫ 효종월드 오목 ⚪</h1>
      <p>귀여운 하늘 위에서 즐기는 오목 한 판!</p>

      <button id="startBtn" class="main-btn">게임 시작</button>
      <a href="../../index.html" class="sub-btn">메인으로</a>
    </section>

    <section id="modeScreen" class="screen">
      <h2>플레이 모드 선택</h2>

      <button id="singleBtn" class="main-btn">싱글 플레이</button>
      <button id="multiBtn" class="main-btn">멀티 플레이</button>
      <button id="backToStartBtn" class="sub-btn">뒤로가기</button>
    </section>

    <section id="roomListScreen" class="screen room-screen">
      <div class="room-header">
        <h2>방 목록</h2>

        <div class="user-menu-wrap">
          <button id="userMenuBtn" class="user-menu-btn">
            👤 <span id="nicknameText">게스트</span>
          </button>

          <div id="userMenuBox" class="user-menu-box">
            <p>닉네임 설정</p>
            <input id="nicknameInput" type="text" maxlength="10" placeholder="닉네임 입력" />
            <button id="saveNicknameBtn">저장</button>
          </div>
        </div>
      </div>

      <div id="roomList" class="room-list">
        <p class="empty-room">아직 생성된 방이 없습니다.</p>
      </div>

      <button id="createRoomBtn" class="main-btn">+ 방 만들기</button>
      <button id="backToModeFromRoomBtn" class="sub-btn">뒤로가기</button>
    </section>

    <section id="createRoomScreen" class="screen">
      <h2>방 만들기</h2>

      <input id="roomNameInput" class="room-input" type="text" maxlength="16" placeholder="방 이름을 입력하세요" />

      <button id="confirmCreateRoomBtn" class="main-btn">방 생성</button>
      <button id="cancelCreateRoomBtn" class="sub-btn">취소</button>
    </section>

    <section id="lobbyScreen" class="screen">
      <h2 id="lobbyRoomName">대기실</h2>

      <div id="playerList" class="player-list"></div>

      <p id="lobbyMessage" class="lobby-message">상대를 기다리는 중...</p>

      <button id="readyBtn" class="main-btn">준비하기</button>
      <button id="startGameBtn" class="main-btn">게임 시작</button>
      <button id="leaveRoomBtn" class="sub-btn">방 나가기</button>
    </section>

    <section id="gameScreen" class="game-screen">
      <div class="game-header">
        <h2>⚫ 오목게임 ⚪</h2>

        <div class="menu-wrap">
          <button id="menuBtn" class="menu-btn">☰</button>

          <div id="gameMenu" class="game-menu">
            <button id="menuResetBtn">🔄 다시하기</button>
            <button id="menuModeBtn">🎮 모드 선택</button>
            <a href="../../index.html">🏠 메인으로</a>
          </div>
        </div>
      </div>

      <div id="gameInfo">
        현재 차례: <span id="turnText">흑돌</span>
      </div>

      <div id="board"></div>
    </section>
  </div>

  <script src="http://localhost:3000/socket.io/socket.io.js"></script>

  <script src="./js/socket.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/board.js"></script>
  <script src="./js/single.js"></script>
  <script src="./js/multi.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
