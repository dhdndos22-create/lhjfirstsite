<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>효종월드</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="sky">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <div id="loginBox" class="login-box">
      <div class="login-card">
        <h2>효종월드 로그인</h2>
        <p>로그인하지 않으면 guest로 이용됩니다.</p>

        <input id="loginUsername" type="text" placeholder="유저명" />
        <input id="loginPassword" type="password" placeholder="비밀번호" />

        <button id="loginBtn">로그인</button>
        <button id="guestBtn">guest로 시작</button>
      </div>
    </div>

    <div id="userBadge" class="user-badge">
      👤 <span id="currentUserText">guest</span>
      <button id="logoutBtn">로그아웃</button>
    </div>
    
    <main class="main-wrap">
      <div class="title-wrap">
        <div class="title-rainbow"></div>
        <div class="title-cloud title-cloud-left"></div>
        <div class="title-cloud title-cloud-right"></div>

        <h1 class="title">효종랜드</h1>
      </div>

      <img src="images/mascot.png" alt="효종월드 캐릭터" class="mascot" />

      <button class="menu-main-btn" onclick="toggleMenu()">MENU</button>

      <div id="mainMenu" class="menu-box">
        <button class="menu-card" onclick="openGameMenu()">🎮 게임</button>
        <a href="gallery.html" class="menu-card">📷 효종갤러리</a>
        <a href="#" class="menu-card preparing">📝 준비중</a>
        <a href="#" class="menu-card preparing">👤 준비중</a>
      </div>

      <div id="gameMenu" class="menu-box">
        <a href="games/avoid/avoid.html" class="menu-card">🎮 장애물 피하기</a>
        <a href="games/hyojongmon/hyojongmon.html" class="menu-card">🗺 효종몬 월드</a>
        <a href="./games/omok/omok.html" class="menu-card">⚫ 오목게임</a>
        <button class="menu-card back-card" onclick="backToMainMenu()">◀ 뒤로가기</button>
      </div>
    </main>

    <div class="grass"></div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
