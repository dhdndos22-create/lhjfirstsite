<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>효종이의 사이트</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #202020, #3a3a3a);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    header {
      padding: 28px 10px;
      font-size: 32px;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.35);
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    }

    main {
      min-height: calc(100vh - 95px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .screen {
      display: none;
      width: 100%;
    }

    .screen.active {
      display: block;
    }

    .main-button,
    .menu-button,
    .back-button,
    .game-button {
      padding: 14px 28px;
      margin: 10px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      background: #ffcc00;
      color: #222;
    }

    .main-button:hover,
    .menu-button:hover,
    .back-button:hover,
    .game-button:hover {
      background: #ffe066;
      transform: scale(1.03);
    }

    .menu-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .blank-menu {
      background: #777;
      color: white;
    }

    .blank-menu:hover {
      background: #999;
    }

    #gameArea {
      position: relative;
      display: inline-block;
      margin-top: 15px;
    }

    canvas {
      background: linear-gradient(#87ceeb, #dff6ff);
      border: 4px solid white;
      border-radius: 12px;
      display: block;
      max-width: 100%;
    }

    #startScreen,
    #gameOverScreen {
      position: absolute;
      width: 800px;
      height: 400px;
      max-width: 100%;
      top: 0;
      left: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
    }

    .hide {
      display: none !important;
    }

    .small-text {
      color: #ddd;
      font-size: 16px;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <header>효종이의 사이트에 오신걸 환영합니다</header>

  <main>
    <!-- 첫 화면 -->
    <section id="homeScreen" class="screen active">
      <button class="main-button" onclick="showScreen('menuScreen')">메뉴 열기</button>
      <p class="small-text">중앙 버튼을 눌러 메뉴를 열어봐</p>
    </section>

    <!-- 메뉴 화면 -->
    <section id="menuScreen" class="screen">
      <div class="menu-box">
        <button class="menu-button" onclick="openGame()">게임</button>
        <button class="menu-button blank-menu" onclick="alert('아직 준비중인 메뉴야!')">OO</button>
        <button class="menu-button blank-menu" onclick="alert('아직 준비중인 메뉴야!')">OO</button>
        <button class="menu-button blank-menu" onclick="alert('아직 준비중인 메뉴야!')">OO</button>
        <button class="back-button" onclick="showScreen('homeScreen')">처음으로</button>
      </div>
    </section>

    <!-- 게임 화면 -->
    <section id="gameScreen" class="screen">
      <button class="back-button" onclick="goMenu()">메뉴로 돌아가기</button>

      <div id="gameArea">
        <canvas id="game" width="800" height="400"></canvas>

        <div id="startScreen">
          <h1>점프 장애물 피하기</h1>
          <p>스페이스바 또는 ↑ 방향키로 점프</p>
          <button class="game-button" onclick="startGame()">게임 시작</button>
        </div>

        <div id="gameOverScreen" class="hide">
          <h1>Game Over</h1>
          <p id="finalScore"></p>
          <button class="game-button" onclick="startGame()">다시하기</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    function showScreen(screenId) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });

      document.getElementById(screenId).classList.add("active");
    }

    function openGame() {
      showScreen("gameScreen");
      stopGame();
      resetGame();
      drawBackground();
      drawPlayer();
      drawScore();
      startScreen.classList.remove("hide");
      gameOverScreen.classList.add("hide");
    }

    function goMenu() {
      stopGame();
      showScreen("menuScreen");
    }

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const finalScore = document.getElementById("finalScore");

    const groundY = 330;

    let player;
    let obstacles;
    let score;
    let bestScore = localStorage.getItem("bestScore") || 0;
    let gameRunning = false;
    let gameOver = false;
    let frame;
    let obstacleTimer;
    let speed;
    let animationId;

    function resetGame() {
      player = {
        x: 90,
        y: groundY - 50,
        width: 45,
        height: 50,
        velocityY: 0,
        gravity: 0.75,
        jumpPower: -15,
        onGround: true
      };

      obstacles = [];
      score = 0;
      frame = 0;
      obstacleTimer = 0;
      speed = 6;
      gameOver = false;
    }

    function startGame() {
      stopGame();
      resetGame();
      gameRunning = true;

      startScreen.classList.add("hide");
      gameOverScreen.classList.add("hide");

      gameLoop();
    }

    function stopGame() {
      gameRunning = false;
      if (animationId) {
        cancelAnimationFrame(animationId);
      }
    }

    function jump() {
      if (gameRunning && player.onGround) {
        player.velocityY = player.jumpPower;
        player.onGround = false;
      }
    }

    document.addEventListener("keydown", function(e) {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        jump();
      }
    });

    canvas.addEventListener("click", jump);

    function createObstacle() {
      const height = Math.floor(Math.random() * 35) + 35;

      obstacles.push({
        x: canvas.width,
        y: groundY - height,
        width: 30,
        height: height
      });
    }

    function updatePlayer() {
      player.velocityY += player.gravity;
      player.y += player.velocityY;

      if (player.y + player.height >= groundY) {
        player.y = groundY - player.height;
        player.velocityY = 0;
        player.onGround = true;
      }
    }

    function updateObstacles() {
      obstacleTimer++;

      if (obstacleTimer > 80 + Math.random() * 50) {
        createObstacle();
        obstacleTimer = 0;
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= speed;

        if (obstacles[i].x + obstacles[i].width < 0) {
          obstacles.splice(i, 1);
          score += 10;
        }
      }
    }

    function checkCollision(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    function checkGameOver() {
      for (let obs of obstacles) {
        if (checkCollision(player, obs)) {
          endGame();
        }
      }
    }

    function endGame() {
      gameRunning = false;
      gameOver = true;

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("bestScore", bestScore);
      }

      finalScore.innerHTML = `
        점수: ${score}<br>
        최고기록: ${bestScore}
      `;

      gameOverScreen.classList.remove("hide");
    }

    function drawBackground() {
      ctx.fillStyle = "#87ceeb";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(680, 70, 35, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#63b35d";
      ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

      ctx.fillStyle = "#3b7a35";
      ctx.fillRect(0, groundY, canvas.width, 8);
    }

    function drawPlayer() {
      ctx.fillStyle = "#ff4d4d";
      ctx.fillRect(player.x, player.y, player.width, player.height);

      ctx.fillStyle = "white";
      ctx.fillRect(player.x + 28, player.y + 10, 8, 8);
    }

    function drawObstacles() {
      ctx.fillStyle = "#333";

      for (let obs of obstacles) {
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
      }
    }

    function drawScore() {
      ctx.fillStyle = "#111";
      ctx.font = "22px Arial";
      ctx.fillText("Score: " + score, 20, 35);
      ctx.fillText("Best: " + bestScore, 20, 65);
    }

    function gameLoop() {
      if (!gameRunning) return;

      frame++;

      updatePlayer();
      updateObstacles();
      checkGameOver();

      if (frame % 300 === 0) {
        speed += 0.5;
      }

      drawBackground();
      drawPlayer();
      drawObstacles();
      drawScore();

      animationId = requestAnimationFrame(gameLoop);
    }

    resetGame();
    drawBackground();
    drawPlayer();
    drawScore();
  </script>
</body>
</html>
